services:
  # ── Backend API (Node.js Web Service) ──────────────────────────
  - type: web
    name: campus-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
      - key: UPI_ID
        sync: false
      - key: UPI_NAME
        sync: false
      - key: QR_IMAGE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Frontend Static Site ────────────────────────────────────────
  - type: web
    name: campus-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
