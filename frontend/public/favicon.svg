<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- graduation cap board -->
  <polygon points="50,22 82,38 50,54 18,38" fill="#fff" opacity="0.95"/>
  <!-- cap top -->
  <ellipse cx="50" cy="54" rx="18" ry="7" fill="#fff" opacity="0.85"/>
  <!-- tassel string -->
  <line x1="82" y1="38" x2="82" y2="62" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <!-- tassel ball -->
  <circle cx="82" cy="65" r="4" fill="#fbbf24"/>
  <!-- stem -->
  <rect x="47" y="54" width="6" height="18" rx="3" fill="#fff" opacity="0.85"/>
  <!-- diploma roll -->
  <rect x="38" y="70" width="24" height="10" rx="5" fill="#fff" opacity="0.9"/>
</svg>
